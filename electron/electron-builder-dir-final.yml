appId: com.science-museum.digital-human
productName: 科技馆数字人讲解系统
copyright: Copyright © 2024 Science Museum

directories:
  buildResources: build
  output: dist-dir-final

files:
  - dist/main.js
  - dist/preload.js
  - dist/python-launcher.js
  - "!dist/win-unpacked/**"
  - "!dist/*.exe"
  - "!dist/*.blockmap"
  - "!dist/*.7z"
  - "!dist/builder-*.yml"
  - "!dist/builder-*.yaml"
  - package.json

extraResources:
  - from: ../backend/dist/backend
    to: backend
  - from: ../data/museum.db
    to: seed/museum.db

win:
  target: [{ target: nsis, arch: [x64] }]
  artifactName: ${productName}-${version}-${arch}-目录模式-直接自启-setup.exe
  sign: null

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: false
  displayLanguageSelector: false
  language: "2052"
